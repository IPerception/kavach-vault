# SQLite test database - file-based so WAL mode works (in-memory SQLite doesn't support WAL)
spring.datasource.url=jdbc:sqlite:./target/kavach-test.db
spring.datasource.hikari.maximum-pool-size=1
spring.jpa.database-platform=com.kavach.config.KavachSQLiteDialect

# Schema is managed by Liquibase (same as production).
# ddl-auto=create-drop cannot apply @UniqueConstraint on SQLite because SQLite
# does not support ALTER TABLE ADD CONSTRAINT - the unique index would never be created.
# Liquibase's raw SQL (CREATE UNIQUE INDEX) works correctly on SQLite.
spring.liquibase.enabled=true
spring.jpa.hibernate.ddl-auto=none

# Reduce noise in test output
spring.jpa.show-sql=false

# Raise rate limits so setUp() calls don't exhaust buckets across test methods
kavach.ratelimit.login.capacity=1000
kavach.ratelimit.otp.capacity=1000
