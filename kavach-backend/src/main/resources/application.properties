spring.application.name=kavach

# --- Server ---
# PortSelector (WebServerFactoryCustomizer) overrides the port at startup if 8080 is taken.
# server.address pins the listener to the loopback interface only - never 0.0.0.0.
server.port=8080
server.address=127.0.0.1

# --- SQLite Datasource ---
# The DB file is placed next to the running JAR (working directory).
# Phase 9 launcher scripts will create the parent directory and manage backups.
spring.datasource.url=jdbc:sqlite:./kavach.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Pool size 1: SQLite supports concurrent readers in WAL mode but only one writer.
# A single connection eliminates all contention for this single-user local app.
spring.datasource.hikari.maximum-pool-size=1

# SQLite community dialect for Hibernate 6 (from hibernate-community-dialects).
spring.jpa.database-platform=com.kavach.config.KavachSQLiteDialect

# Schema is managed exclusively by Liquibase - Hibernate must not touch DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# --- Liquibase ---
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# --- Error Handling ---
# Enables Spring Boot's built-in RFC 7807 ProblemDetail responses for standard
# Spring MVC exceptions (e.g., MethodArgumentNotValidException -> 400 ProblemDetail).
spring.mvc.problemdetails.enabled=true

# --- OpenAPI / Swagger UI ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
